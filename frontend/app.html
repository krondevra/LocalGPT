<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalGPT</title>
    <meta name="description" content="LocalGPT — Local chat UI with authentication and chat history.">
    <meta property="og:title" content="LocalGPT">
    <meta property="og:description" content="LocalGPT — Local chat UI with authentication and chat history.">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="topbar">
        <div class="topbar-title">LocalGPT</div>
        <div id="userDisplay">Logged in as ...</div>
        <button class="btn btn-small" id="logoutBtn">Log out</button>
    </div>

    <div class="app-main">
    <div class="sidebar">
        <div class="sidebar-header">
            <span>Chats</span>

            <div class="chat-actions">
                <button class="icon-btn green-btn" id="newChatBtn">+</button>
                <button class="icon-btn red-btn" id="deleteChatBtn">−</button>
            </div>
        </div>
    <ul class="chat-list" id="chatList"></ul>
    </div>
    <div class="chat-area">
        <div class="chat-messages" id="chatMessages"></div>

        <div class="chat-input-row">
            <textarea id="chatInput" placeholder="Type a message..." rows="2"></textarea>
            <button class="btn btn-primary" id="sendBtn">Send</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>

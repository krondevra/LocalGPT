<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalGPT App - Chat</title>
    <meta name="description" content="LocalGPT chat application with authentication, chat history and responsive interface.">
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#181a1b">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header class="topbar" role="banner">
    <button class="sidebar-toggle-btn" id="sidebarToggleBtn" type="button" aria-label="Show or hide chat sidebar" aria-expanded="true">
        <span aria-hidden="true">☰</span>
    </button>
    <div class="topbar-title">LocalGPT</div>
    <div class="topbar-user" id="userDisplay">Checking session...</div>
    <button class="btn btn-small" id="logoutBtn" type="button">Log out</button>
</header>

<div class="sidebar-backdrop hidden" id="sidebarBackdrop"></div>

<div class="app-main">
    <aside class="sidebar" id="sidebar" aria-label="Chat sidebar">
        <div class="sidebar-header">
            <span>Chats</span>
            <button class="sidebar-close-btn" id="sidebarCloseBtn" type="button" aria-label="Close sidebar">×</button>
            <div class="chat-actions">
                <button class="new-chat-btn" id="newChatBtn" type="button" aria-label="Create new chat">
                    <span class="new-chat-icon" aria-hidden="true">+</span>
                    <span>New chat</span>
                </button>
            </div>
        </div>
        <ul class="chat-list" id="chatList" aria-label="Saved chats"></ul>

    </aside>

    <main class="chat-area" aria-label="Chat area">
        <div class="status-banner" id="statusBanner" role="status" aria-live="polite"></div>

        <section class="chat-toolbar" aria-label="Selected chat information">
            <div class="chat-title-block">
                <p class="chat-eyebrow">Current chat</p>
                <h1 class="chat-title-heading" id="chatTitleHeading">No chat selected</h1>
            </div>
            <input id="chatTitleInput" class="sr-only" maxlength="80" aria-label="Selected chat title" aria-hidden="true" tabindex="-1">
            <button class="hidden" id="renameChatBtn" type="button">Rename</button>
            <button class="hidden" id="deleteChatBtn" type="button">Delete</button>
        </section>

        <section class="chat-messages" id="chatMessages" aria-live="polite" aria-label="Messages">
            <div class="empty-state">
                <h2>No chat selected</h2>
                <p>Create a new chat or select an existing one from the sidebar.</p>
            </div>
        </section>

        <form class="chat-input-row" id="chatForm">
            <label class="sr-only" for="chatInput">Message</label>
            <textarea id="chatInput" placeholder="Type a message..." rows="2" maxlength="4000"></textarea>
            <button class="send-icon-btn" id="sendBtn" type="submit" aria-label="Send message">
                <span aria-hidden="true">↑</span>
            </button>
        </form>
        <p class="input-help">Press Enter to send. Press Shift + Enter for a new line.</p>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
